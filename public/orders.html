<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — BookStore</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <a href="customer.html" class="logo">📚 BookStore</a>
  <div class="menu">
    <a href="customer.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="orders.html" class="active">Orders</a>
    <a href="request.html">Request</a>
    <a href="cart.html" class="cart-link">🛒 Cart</a>
  </div>
</div>

<div class="page-wrap">
  <div class="section-header">
    <h2>Your Orders</h2>
    <p>All your past purchases in one place</p>
    <div class="section-divider"></div>
  </div>

  <div id="orders"></div>
</div>

<footer class="footer"><p>© 2026 <span style="color:var(--terracotta)">BookStore</span></p></footer>

<script>
fetch("/sales")
  .then(res=>res.json())
  .then(data=>{
    const container = document.getElementById("orders");
    if(!data.length){
      container.innerHTML='<div style="text-align:center;padding:80px;background:var(--white);border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.08)"><div style="font-size:4rem;margin-bottom:20px">📦</div><h3 style="font-family:Playfair Display,serif;font-size:1.6rem;margin-bottom:10px">No orders yet</h3><p style="color:#7A6E62;margin-bottom:24px">Start shopping to see your orders here.</p><a href="shop.html" class="btn btn-primary">Browse Books</a></div>';
      return;
    }
    data.forEach(order=>{
      container.innerHTML+=`<div class="order-card"><div><h3>${order.title}</h3><p style="color:var(--muted);font-size:0.82rem;margin-top:4px">${new Date(order.date).toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'})}</p></div><p>₹${order.price}</p></div>`;
    });
  })
  .catch(()=>{
    document.getElementById("orders").innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:20px"><p style="color:var(--muted)">Connect to backend to view orders.</p></div>';
  });
</script>
</body>
</html>
