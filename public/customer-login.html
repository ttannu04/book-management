<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login — BookStore</title>
<link rel="stylesheet" href="style.css">
<style>
body{display:flex;min-height:100vh;background:var(--charcoal);}
.login-side{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 40px;}
.login-art{flex:1;background:linear-gradient(135deg,var(--terracotta),var(--rust));display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;padding:60px;text-align:center;}
.login-art h2{font-family:'Playfair Display',serif;font-size:2.6rem;margin-bottom:18px;line-height:1.25;}
.login-art p{font-size:1rem;opacity:0.8;max-width:340px;line-height:1.7;}
.login-art .emoji-float{font-size:5rem;margin-bottom:30px;animation:sway 3s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
.login-card{background:var(--white);border-radius:var(--radius-lg);padding:48px 44px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,0.35);}
.login-card h2{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--charcoal);margin-bottom:8px;}
.login-card p{color:var(--muted);font-size:0.9rem;margin-bottom:32px;}
.divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:var(--muted);font-size:0.82rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--parchment);}
.guest-btn{width:100%;padding:13px;background:var(--cream);border:1.5px solid var(--parchment);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;color:var(--charcoal);cursor:pointer;transition:var(--transition);}
.guest-btn:hover{border-color:var(--terracotta);color:var(--terracotta);}
@media(max-width:768px){.login-art{display:none;}.login-card{padding:36px 28px;}}
</style>
</head>
<body>

<div class="login-art">
  <div class="emoji-float">📚</div>
  <h2>Welcome Back, Reader</h2>
  <p>Sign in to explore our curated collection of books and continue your reading journey.</p>
</div>

<div class="login-side">
  <div class="login-card">
    <h2>Customer Login</h2>
    <p>Enter your credentials to access your account</p>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;">Login</button>
    </form>

    <div class="divider">or</div>

    <button class="guest-btn" onclick="guestLogin()">👤 Continue as Guest</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
function showToast(msg, type='info'){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}
document.getElementById("loginForm").onsubmit = function(e){
  e.preventDefault();
  fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("username").value,password:document.getElementById("password").value})})
  .then(res=>res.json())
  .then(data=>{
    if(data.success){ localStorage.setItem("user","customer"); window.location="customer.html"; }
    else showToast("Invalid credentials", "error");
  }).catch(()=>{ localStorage.setItem("user","customer"); window.location="customer.html"; });
}
function guestLogin(){ localStorage.setItem("user","guest"); window.location="customer.html"; }
</script>
</body>
</html>
