<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Report — BookStore</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h2>📚 BookStore</h2>
    <p>Admin Panel</p>
  </div>
  <nav class="sidebar-nav">
    <a href="admin.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a href="manage-books.html"><span class="nav-icon">📚</span> Manage Books</a>
    <a href="sales.html" class="active"><span class="nav-icon">💰</span> Sales Report</a>
  </nav>
  <div class="sidebar-footer">
    <a onclick="logout()"><span>🚪</span> Logout</a>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <div>
      <h1>Sales Report</h1>
      <p>Overview of all completed transactions.</p>
    </div>
    <button class="btn btn-outline" onclick="exportCSV()">⬇ Export CSV</button>
  </div>

  <div class="main-content">
    <div class="table-wrap">
      <div class="table-wrap-header">
        <h3>Transaction History</h3>
      </div>
      <table>
        <thead>
          <tr><th>#</th><th>Book Title</th><th>Price</th><th>Date</th></tr>
        </thead>
        <tbody id="sales"><tr><td colspan="4" style="text-align:center;padding:30px;color:var(--muted)">Loading sales...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="sales.js"></script>
<script>function logout(){ fetch("/logout").catch(()=>{}); localStorage.clear(); window.location="login.html"; }</script>
</body>
</html>
